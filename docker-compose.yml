services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: academy-quiz-app
    container_name: academy-quiz-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    expose:
      - "9000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_DATABASE=quiz_system
      - DB_USERNAME=root
      - DB_PASSWORD=secret

  nginx:
    image: nginx:alpine
    container_name: academy-quiz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: academy-quiz-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: quiz_system
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
